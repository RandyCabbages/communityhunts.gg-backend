name: Check Rainbet for new slots

# The scrape now runs every 10 min inside the live backend process on Railway
# (see lib/rainbetSlotSync.js) — GitHub's `schedule` trigger was observed firing
# every 1.5-5hrs instead of the configured 30 min under load, which is what let
# new Rainbet releases sit missing for hours. This workflow is kept as a manual
# backup/debug path only.
on:
  workflow_dispatch:  # Lets you trigger manually from the Actions tab

permissions:
  contents: write  # Required so the workflow can commit + push the updated json

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run scrape + diff
        id: scrape
        run: node scripts/check_new_slots.js

      - name: Commit & push if rainbet_slots.json changed
        run: |
          if [ -z "$(git status --porcelain rainbet_slots.json)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "rainbet-slots-bot"
          git config user.email "actions@users.noreply.github.com"
          git add rainbet_slots.json
          git commit -m "auto: rainbet new releases ($(date -u +%Y-%m-%d))"
          git push

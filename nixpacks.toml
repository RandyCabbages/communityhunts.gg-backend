[variables]
# lib/rainbetSlotSync.js drives playwright against the system Chromium below (via
# the CHROMIUM_PATH env var, set separately in Railway) instead of playwright's own
# ~300MB bundled download.
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "glib",
  "nspr",
  "atk",
  "at-spi2-atk",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "pango",
  "cairo",
  "cups",
  "expat",
  "alsa-lib",
  "dbus"
]
